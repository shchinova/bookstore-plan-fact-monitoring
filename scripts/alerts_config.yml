# =============================================================================
# alerts_config.yml
# Конфигурация email-уведомлений об остатках.
#
# Переменные окружения для SMTP (задаются в .env):
#   ALERT_SENDER    — Gmail-адрес отправителя
#   ALERT_PASSWORD  — пароль приложения Gmail (App Password, не основной пароль)
#                     Получить: Google Account → Безопасность → Пароли приложений
#
# Этот файл содержит только бизнес-настройки (кому, что, пороги).
# Секреты (логин/пароль) хранятся исключительно в .env.
# =============================================================================

# -----------------------------------------------------------------------------
# Получатели уведомлений
# -----------------------------------------------------------------------------
recipients:

  # Основной список — получает все уровни тревог
  - email: leon18th@gmail.com
    name:  Елена Щинова
    roles: [analyst]   # все уровни

# -----------------------------------------------------------------------------
# Настройки SMTP
# -----------------------------------------------------------------------------
smtp:
  host: smtp.gmail.com
  port: 587                # TLS (STARTTLS); для SSL используйте порт 465
  use_tls: true

# -----------------------------------------------------------------------------
# Настройки письма
# -----------------------------------------------------------------------------
email:
  subject_prefix: "[Книжный магазин]"   # добавляется в начало темы письма
  # Тема формируется автоматически:
  # "[Bookstore] ⚠ Низкие остатки: 3 critical, 7 urgent, 12 warning — 2026-04-15"

# -----------------------------------------------------------------------------
# Пороги уровней тревоги (должны совпадать с 03_mart_inventory_alerts.sql)
# -----------------------------------------------------------------------------
thresholds:
  critical: 0    # closing_stock = 0   (склад полностью пуст)
  urgent:   5    # closing_stock < 5   (осталось менее 5 экземпляров)
  warning:  15   # closing_stock < 15  (LOW_STOCK_THRESHOLD)

# -----------------------------------------------------------------------------
# Поведение скрипта
# -----------------------------------------------------------------------------
behavior:
  # Отправлять письмо, только если есть хотя бы один товар с уровнем ниже или равным min_level_to_send
  # Допустимые значения: critical | urgent | warning
  # warning  — отправлять при любых товарах ниже порога (рекомендуется)
  # urgent   — отправлять только при urgent + critical
  # critical — отправлять только если склад пуст
  min_level_to_send: warning

  # Максимальное количество товаров в таблице письма (остальные обрезаются)
  max_rows_in_email: 50